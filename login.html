<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrandStay Analytics | Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1c 0%, #03060c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.08), transparent 70%);
            top: -20%;
            left: -20%;
            animation: float1 20s infinite alternate;
        }

        body::after {
            content: "";
            position: absolute;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(123, 31, 162, 0.1), transparent 70%);
            bottom: -30%;
            right: -20%;
            animation: float2 18s infinite alternate-reverse;
        }

        @keyframes float1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.3); }
        }

        @keyframes float2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-5%, -5%) scale(1.4); }
        }

        .login-card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            background: rgba(10, 18, 28, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .login-card:hover {
            border-color: rgba(0, 230, 230, 0.7);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.15);
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #A5F3FC, #22D3EE);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            color: #cbd5e6;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(34, 211, 238, 0.4);
            border-radius: 40px;
            padding: 14px 20px;
            font-size: 1rem;
            color: #f1f5f9;
            outline: none;
        }

        .input-group input:focus {
            border-color: #22D3EE;
            box-shadow: 0 0 12px rgba(34, 211, 238, 0.3);
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .error-message {
            background: rgba(255, 80, 80, 0.15);
            border-left: 4px solid #ff4d4d;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 0.8rem;
            color: #ffb3b3;
            margin-bottom: 1.2rem;
            display: none;
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(95deg, #0F172A, #1E293B);
            border: 1px solid rgba(34, 211, 238, 0.6);
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            color: #E2E8F0;
            cursor: pointer;
            transition: all 0.25s;
        }

        .login-btn:hover {
            background: linear-gradient(95deg, #1E2A3A, #0F172A);
            border-color: #22D3EE;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.4);
        }

        .demo-info {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #6c7a91;
            border-top: 1px dashed rgba(34, 211, 238, 0.3);
            padding-top: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1>🏨 GRANDSTAY</h1>
            <p>premium hospitality analytics</p>
        </div>
        
        <div class="input-group">
            <label>👤 Username</label>
            <input type="text" id="username" placeholder="Enter username" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label>🔒 Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Enter password">
                <button type="button" class="toggle-password" id="togglePwd">👁️</button>
            </div>
        </div>
        
        <div id="errorMsg" class="error-message"></div>
        
        <button class="login-btn" id="loginBtn">✨ ACCESS DASHBOARD ✨</button>
        
        <div class="demo-info">
            Demo Credentials: <strong style="color:#22D3EE">admin / 12345</strong>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('togglePwd');
        const passwordInput = document.getElementById('password');
        
        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            toggleBtn.textContent = type === 'password' ? '👁️' : '🙈';
        });

        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');
        const errorDiv = document.getElementById('errorMsg');

        function validateLogin() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            
            if (username === 'admin' && password === '12345') {
                errorDiv.style.display = 'none';
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('username', username);
                window.location.href = 'index.html';
                return true;
            } else {
                errorDiv.textContent = '❌ Invalid credentials! Use admin / 12345';
                errorDiv.style.display = 'block';
                return false;
            }
        }

        loginBtn.addEventListener('click', validateLogin);
        
        const handleEnter = (e) => {
            if (e.key === 'Enter') validateLogin();
        };
        usernameInput.addEventListener('keypress', handleEnter);
        passwordInput.addEventListener('keypress', handleEnter);

        if (sessionStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
